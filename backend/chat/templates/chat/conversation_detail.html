{% extends 'layout.html' %}

{% load static %}

{% block title %}
    {{ conversation.title }}
{% endblock %}

{% block content %}
    <div class="conversation-detail-main">
        <a href={% url 'chat:conversation_list' %}>Back to chats</a>
        <div id="messages-contariner">
            {% for message in messages %}
                <div class="message">
                    {{ message.content }}
                </div>
            {% endfor %}
        </div>
        <form id="send-message-form" class="conversation-send-message-form">
            {% csrf_token %}
            <input type="text" name="message" placeholder="Type to {{ conversation.companion_id.name }}" required>
            <button type="submit">Send</button>
        </form>
    </div>
    <script>
        let url = `ws://${window.location.host}/ws/{{ conversation.id|escapejs }}/send_message/`
        const chatSocket = new WebSocket(url)

        chatSocket.onmessage = function(event) {
            let data = JSON.parse(event.data)
            console.log(data)
        }

        let form = document.getElementById('send-message-form')
        form.addEventListener('submit', (event)=> {
            event.preventDefault()
            let message = event.target.message.value
            console.log(message)
            chatSocket.send(JSON.stringify({
                'message':message
            }))
            form.reset()
        })
    </script>
{% endblock %}
