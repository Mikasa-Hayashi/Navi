{% extends 'layout.html' %}

{% block content %}
    <div class="conversation-list-sidebar">
        <ul class="chat-list">
            {% for conversation in conversations %}
                <a class="chat-item" href="{% url 'chat:conversation_detail' conversation_id=conversation.id %}">
                    <div class="chat-avatar">
                        <img class="avatar-photo" src="{{ conversation.companion_id.avatar }}">
                    </div>
                    <div class="chat-info">
                        <div class="chat-title">
                            {{ conversation.title }}
                        </div>
                        <div class="chat-subtitle">
                            
                        </div>
                    </div>
                </a>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
