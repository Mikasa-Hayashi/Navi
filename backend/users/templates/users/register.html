<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>
    <h1>Registration</h1>
    <form class="form-with-validation" action="{% url 'users:register' %}" method="post">
        {% csrf_token %}
        {{ form }}
        <button>Submit</button>
    </form>
    <p>Have an account? -  <a href="{% url 'users:login' %}">sign in</a>!</p>
</body>
</html>
